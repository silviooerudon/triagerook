name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny token scope. Reads are all this workflow needs — no PR
# comments, no deploys, no releases. Add explicit per-step scopes if
# that ever changes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pin first-party actions to the full commit SHA. The IaC detector
      # in lib/iac.ts skips actions/, github/, docker/ orgs as "lower
      # risk" so the self-scan won't flag this, but pinning by SHA is
      # still the practice we recommend to users — eat our own dogfood.
      # Comment carries the human-readable tag so renovate/dependabot
      # can bump both at once.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders. lib/supabase.ts throws if these are
          # unset because the client is created at module-init. Real values
          # live in Vercel and are only used at request time.
          AUTH_SECRET: ci-placeholder-do-not-use
          AUTH_GITHUB_APP_CLIENT_ID: ci-placeholder
          AUTH_GITHUB_APP_CLIENT_SECRET: ci-placeholder
          SUPABASE_URL: https://ci.placeholder.supabase.co
          SUPABASE_SECRET_KEY: ci-placeholder
