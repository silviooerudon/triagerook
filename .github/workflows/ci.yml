name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders. lib/supabase.ts throws if these are
          # unset because the client is created at module-init. Real values
          # live in Vercel and are only used at request time.
          AUTH_SECRET: ci-placeholder-do-not-use
          AUTH_GITHUB_ID: ci-placeholder
          AUTH_GITHUB_SECRET: ci-placeholder
          SUPABASE_URL: https://ci.placeholder.supabase.co
          SUPABASE_SECRET_KEY: ci-placeholder
